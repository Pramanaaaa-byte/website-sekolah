<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64748b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#475569;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#grad)" stroke="#fff" stroke-width="1"/>
  
  <!-- Graduation cap -->
  <g transform="translate(16, 16)">
    <!-- Cap base -->
    <path d="M -8 2 L 0 -2 L 8 2 L 0 6 Z" fill="#fff" opacity="0.9"/>
    <!-- Cap top -->
    <path d="M -8 2 L 0 -2 L 8 2 L 0 6 Z" fill="none" stroke="#fff" stroke-width="0.5"/>
    <!-- Tassel -->
    <line x1="0" y1="-2" x2="0" y2="-6" stroke="#fff" stroke-width="1" stroke-linecap="round"/>
    <circle cx="0" cy="-6" r="1.5" fill="#fff"/>
  </g>
  
  <!-- Small decoration dots -->
  <circle cx="8" cy="8" r="1" fill="#fff" opacity="0.7"/>
  <circle cx="24" cy="8" r="1" fill="#fff" opacity="0.7"/>
  <circle cx="8" cy="24" r="1" fill="#fff" opacity="0.7"/>
  <circle cx="24" cy="24" r="1" fill="#fff" opacity="0.7"/>
</svg>
